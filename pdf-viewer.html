<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Book Reader</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#111;
color:#fff;
}

/* ===== HEADER ===== */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 20px;
background:#000;
position:fixed;
width:100%;
top:0;
z-index:10;
}

.header h2{
font-size:18px;
}

.header button{
padding:6px 12px;
margin-left:10px;
border:none;
background:#ff4d4d;
color:white;
cursor:pointer;
border-radius:4px;
}

.header button:hover{
background:#ff1a1a;
}

/* ===== PDF CONTAINER ===== */
.viewer{
margin-top:60px;
height:calc(100vh - 60px);
}

iframe{
width:100%;
height:100%;
border:none;
background:#fff;
}

/* ===== MOBILE FIX ===== */
@media(max-width:768px){
.header h2{
font-size:14px;
}
.header button{
padding:5px 8px;
font-size:12px;
}
}
</style>
</head>

<body>

<div class="header">
<h2 id="bookTitle">Loading...</h2>
<div>
<button onclick="downloadPDF()">Download</button>
<button onclick="goBack()">Close</button>
</div>
</div>

<div class="viewer">
<iframe id="pdfFrame"></iframe>
</div>

<script>
// ===== GET DATA FROM URL =====
const params = new URLSearchParams(window.location.search);
const file = params.get("file");
const title = params.get("title");

if(file){
document.title = title || "E-Book Reader";
document.getElementById("bookTitle").innerText = title || "E-Book Reader";
document.getElementById("pdfFrame").src = file;
}else{
document.body.innerHTML = "<h2 style='padding:20px'>No PDF Found</h2>";
}

// ===== FUNCTIONS =====
function downloadPDF(){
window.open(file);
}

function goBack(){
window.history.back();
}
</script>

</body>
</html>
