<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome — Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>

<style>
    /* ── Reset & Variables ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0a0a0f;
  --surface:   rgba(255,255,255,0.04);
  --border:    rgba(255,255,255,0.10);
  --border-hi: rgba(255,255,255,0.22);
  --text:      #f0ede8;
  --muted:     #8c8a87;
  --accent:    #c8a97e;
  --accent-hi: #e2c9a0;
  --danger:    #e07070;
  --success:   #78c9a0;
  --radius:    14px;
  --font-display: 'Fraunces', Georgia, serif;
  --font-body:    'DM Sans', system-ui, sans-serif;
  --transition:   0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

html { font-size: 16px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-weight: 300;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  overflow-x: hidden;
}

/* ── Background Orbs ───────────────────────────────────────── */
.bg-orbs {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.45;
  animation: drift 18s ease-in-out infinite alternate;
}
.orb-1 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, #7b5ea7 0%, transparent 70%);
  top: -15%; left: -10%;
  animation-duration: 20s;
}
.orb-2 {
  width: 420px; height: 420px;
  background: radial-gradient(circle, #3a7cb8 0%, transparent 70%);
  bottom: -10%; right: -5%;
  animation-duration: 15s;
  animation-delay: -6s;
}
.orb-3 {
  width: 280px; height: 280px;
  background: radial-gradient(circle, #c8784a 0%, transparent 70%);
  top: 50%; left: 55%;
  animation-duration: 25s;
  animation-delay: -12s;
  opacity: 0.3;
}
@keyframes drift {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(40px, -30px) scale(1.08); }
}

/* ── Card ──────────────────────────────────────────────────── */
.card-wrapper {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  background: var(--surface);
  backdrop-filter: blur(28px) saturate(1.4);
  -webkit-backdrop-filter: blur(28px) saturate(1.4);
  border: 1px solid var(--border);
  border-radius: calc(var(--radius) * 1.6);
  padding: 2.4rem 2.4rem 2.8rem;
  box-shadow: 0 32px 80px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.07);
  animation: slideUp 0.55s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Brand ─────────────────────────────────────────────────── */
.brand {
  display: flex;
  align-items: center;
  gap: 0.55rem;
  margin-bottom: 1.8rem;
}
.brand-icon {
  font-size: 1.4rem;
  color: var(--accent);
  line-height: 1;
  animation: spin-slow 10s linear infinite;
}
@keyframes spin-slow { to { transform: rotate(360deg); } }
.brand-name {
  font-family: var(--font-display);
  font-size: 1.35rem;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text);
}

/* ── Tabs ──────────────────────────────────────────────────── */
.tabs {
  position: relative;
  display: flex;
  gap: 0;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 1.8rem;
}
.tab {
  flex: 1;
  background: none;
  border: none;
  color: var(--muted);
  font-family: var(--font-body);
  font-size: 0.875rem;
  font-weight: 400;
  padding: 0.55rem 0.75rem;
  border-radius: 7px;
  cursor: pointer;
  position: relative;
  z-index: 1;
  transition: color var(--transition);
}
.tab.active { color: var(--text); font-weight: 500; }
.tab-indicator {
  position: absolute;
  top: 4px; bottom: 4px; left: 4px;
  width: calc(50% - 4px);
  background: rgba(255,255,255,0.10);
  border-radius: 7px;
  border: 1px solid var(--border-hi);
  transition: transform var(--transition);
  pointer-events: none;
}
.tab-indicator.right { transform: translateX(100%); }

/* ── Toast ─────────────────────────────────────────────────── */
.toast {
  display: none;
  padding: 0.75rem 1rem;
  border-radius: var(--radius);
  font-size: 0.85rem;
  margin-bottom: 1.2rem;
  border: 1px solid transparent;
  animation: fadeIn 0.2s ease;
}
.toast.show { display: block; }
.toast.success {
  background: rgba(120, 201, 160, 0.12);
  border-color: rgba(120, 201, 160, 0.3);
  color: var(--success);
}
.toast.error {
  background: rgba(224, 112, 112, 0.12);
  border-color: rgba(224, 112, 112, 0.3);
  color: var(--danger);
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Panels ────────────────────────────────────────────────── */
.panel {
  display: none;
  animation: panelIn 0.3s cubic-bezier(0.22,1,0.36,1) both;
}
.panel.active { display: block; }
@keyframes panelIn {
  from { opacity: 0; transform: translateX(12px); }
  to   { opacity: 1; transform: translateX(0); }
}
.panel-subtitle {
  color: var(--muted);
  font-size: 0.88rem;
  margin-bottom: 1.6rem;
  line-height: 1.5;
}

/* ── Fields ────────────────────────────────────────────────── */
.field {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  margin-bottom: 1.1rem;
}
label {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.input-wrap { position: relative; display: flex; }
input[type="text"],
input[type="email"],
input[type="password"] {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.72rem 1rem;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.92rem;
  font-weight: 300;
  outline: none;
  transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
}
.input-wrap input { padding-right: 2.8rem; }
input::placeholder { color: rgba(255,255,255,0.22); }
input:focus {
  border-color: var(--accent);
  background: rgba(200,169,126,0.06);
  box-shadow: 0 0 0 3px rgba(200,169,126,0.12);
}
input.invalid {
  border-color: var(--danger);
  box-shadow: 0 0 0 3px rgba(224,112,112,0.12);
}

.toggle-pw {
  position: absolute;
  right: 0.75rem;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  padding: 0;
  line-height: 0;
  transition: color var(--transition);
}
.toggle-pw:hover { color: var(--text); }
.toggle-pw svg { width: 17px; height: 17px; }

.field-error {
  font-size: 0.78rem;
  color: var(--danger);
  min-height: 1rem;
  display: block;
}

/* ── Password Strength ─────────────────────────────────────── */
.pw-strength {
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 99px;
  overflow: hidden;
  margin-top: 2px;
}
.pw-bar {
  display: block;
  height: 100%;
  width: 0%;
  border-radius: 99px;
  transition: width 0.35s ease, background 0.35s ease;
}
.pw-bar.weak   { background: var(--danger);  width: 30%; }
.pw-bar.fair   { background: #d4a843;         width: 60%; }
.pw-bar.strong { background: var(--success);  width: 100%; }

/* ── Buttons ───────────────────────────────────────────────── */
.btn-primary {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  width: 100%;
  margin-top: 1.5rem;
  padding: 0.8rem 1.5rem;
  background: linear-gradient(135deg, var(--accent) 0%, #b8855c 100%);
  color: #1a1208;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 0.92rem;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.01em;
  transition: opacity var(--transition), transform var(--transition), box-shadow var(--transition);
  box-shadow: 0 4px 20px rgba(200,169,126,0.28);
}
.btn-primary:hover:not(:disabled) {
  opacity: 0.92;
  transform: translateY(-1px);
  box-shadow: 0 6px 28px rgba(200,169,126,0.38);
}
.btn-primary:active:not(:disabled) { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }

/* Loader spinner */
.btn-loader {
  width: 16px; height: 16px;
  border: 2px solid rgba(26,18,8,0.25);
  border-top-color: #1a1208;
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.link-btn {
  background: none;
  border: none;
  color: var(--accent);
  font-family: var(--font-body);
  font-size: 0.82rem;
  font-weight: 400;
  cursor: pointer;
  padding: 0;
  text-decoration: underline;
  text-decoration-color: transparent;
  transition: text-decoration-color var(--transition), color var(--transition);
}
.link-btn:hover {
  color: var(--accent-hi);
  text-decoration-color: var(--accent-hi);
}
.forgot-link { display: block; text-align: right; margin-top: -0.4rem; }
.back-link { display: block; text-align: center; margin-top: 1rem; }

/* ── Responsive ────────────────────────────────────────────── */
@media (max-width: 480px) {
  .card-wrapper { padding: 1.8rem 1.5rem 2.2rem; }
}
</style>
<body>

  <div class="bg-orbs">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <main class="card-wrapper">
    <div class="brand">
      <div class="brand-icon">✦</div>
      <span class="brand-name">Lumina</span>
    </div>

    <!-- Tabs -->
    <div class="tabs" role="tablist">
      <button class="tab active" id="tab-login" role="tab" aria-selected="true" aria-controls="panel-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab" id="tab-signup" role="tab" aria-selected="false" aria-controls="panel-signup" onclick="switchTab('signup')">Create Account</button>
      <span class="tab-indicator" id="tab-indicator"></span>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast" aria-live="polite" role="status"></div>

    <!-- Login Panel -->
    <div class="panel active" id="panel-login" role="tabpanel" aria-labelledby="tab-login">
      <p class="panel-subtitle">Welcome back — sign in to continue.</p>
      <form id="form-login" novalidate>
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" name="email" placeholder="you@example.com" autocomplete="email" required/>
          <span class="field-error" id="login-email-err"></span>
        </div>
        <div class="field">
          <label for="login-password">Password</label>
          <div class="input-wrap">
            <input type="password" id="login-password" name="password" placeholder="••••••••" autocomplete="current-password" required/>
            <button type="button" class="toggle-pw" aria-label="Toggle password visibility" onclick="togglePw('login-password', this)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="field-error" id="login-password-err"></span>
        </div>
        <button type="button" class="link-btn forgot-link" onclick="switchTab('reset')">Forgot password?</button>
        <button type="submit" class="btn-primary" id="btn-login">
          <span class="btn-text">Sign In</span>
          <span class="btn-loader" hidden></span>
        </button>
      </form>
    </div>

    <!-- Signup Panel -->
    <div class="panel" id="panel-signup" role="tabpanel" aria-labelledby="tab-signup">
      <p class="panel-subtitle">Create your account in seconds.</p>
      <form id="form-signup" novalidate>
        <div class="field">
          <label for="signup-username">Username</label>
          <input type="text" id="signup-username" name="username" placeholder="johndoe" autocomplete="username" required/>
          <span class="field-error" id="signup-username-err"></span>
        </div>
        <div class="field">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" name="email" placeholder="you@example.com" autocomplete="email" required/>
          <span class="field-error" id="signup-email-err"></span>
        </div>
        <div class="field">
          <label for="signup-password">Password</label>
          <div class="input-wrap">
            <input type="password" id="signup-password" name="password" placeholder="••••••••" autocomplete="new-password" required/>
            <button type="button" class="toggle-pw" aria-label="Toggle password visibility" onclick="togglePw('signup-password', this)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="pw-strength" id="pw-strength">
            <span class="pw-bar" id="pw-bar"></span>
          </div>
          <span class="field-error" id="signup-password-err"></span>
        </div>
        <button type="submit" class="btn-primary" id="btn-signup">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader" hidden></span>
        </button>
      </form>
    </div>

    <!-- Reset Password Panel -->
    <div class="panel" id="panel-reset" role="tabpanel">
      <p class="panel-subtitle">We'll send a reset link to your inbox.</p>
      <form id="form-reset" novalidate>
        <div class="field">
          <label for="reset-email">Email</label>
          <input type="email" id="reset-email" name="email" placeholder="you@example.com" autocomplete="email" required/>
          <span class="field-error" id="reset-email-err"></span>
        </div>
        <button type="submit" class="btn-primary" id="btn-reset">
          <span class="btn-text">Send Reset Link</span>
          <span class="btn-loader" hidden></span>
        </button>
        <button type="button" class="link-btn back-link" onclick="switchTab('login')">← Back to Sign In</button>
      </form>
    </div>

  </main>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
  <script>
    /* ═══════════════════════════════════════════════════════════════
   ⚙️  CONFIGURATION — Replace these placeholders before deploying
   ═══════════════════════════════════════════════════════════════ */
const SUPABASE_URL    = 'https://gvahwgwyyzjpretlwpmz.supabase.co';
const SUPABASE_ANON   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2YWh3Z3d5eXpqcHJldGx3cG16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NTM2NzgsImV4cCI6MjA4NzQyOTY3OH0.nG1lR-WxaRfFDvWyU8lp5PY9XC0Dp9-Yjk_kihLjdqU';
const REDIRECT_URL    = 'https://YOUR_REDIRECT_URL_AFTER_LOGIN'; // e.g. '/dashboard'

/* ── Init Supabase ─────────────────────────────────────────── */
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

/* ── Tab State ─────────────────────────────────────────────── */
let currentTab = 'login';

function switchTab(tab) {
  // Hide all panels
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  const indicator = document.getElementById('tab-indicator');

  if (tab === 'login') {
    document.getElementById('panel-login').classList.add('active');
    document.getElementById('tab-login').classList.add('active');
    document.getElementById('tab-login').setAttribute('aria-selected', 'true');
    document.getElementById('tab-signup').setAttribute('aria-selected', 'false');
    indicator.classList.remove('right');
    indicator.style.display = '';
  } else if (tab === 'signup') {
    document.getElementById('panel-signup').classList.add('active');
    document.getElementById('tab-signup').classList.add('active');
    document.getElementById('tab-signup').setAttribute('aria-selected', 'true');
    document.getElementById('tab-login').setAttribute('aria-selected', 'false');
    indicator.classList.add('right');
    indicator.style.display = '';
  } else {
    // reset — hide tab bar indicator
    document.getElementById('panel-reset').classList.add('active');
    indicator.style.display = 'none';
  }

  clearToast();
  currentTab = tab;
}

/* ── Toast ─────────────────────────────────────────────────── */
let toastTimer = null;

function showToast(msg, type = 'error') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type}`;
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 5500);
}

function clearToast() {
  const el = document.getElementById('toast');
  el.classList.remove('show');
}

/* ── Field Validation Helpers ──────────────────────────────── */
function setError(id, msg) {
  const err = document.getElementById(id);
  if (err) err.textContent = msg;
  const input = err?.previousElementSibling?.tagName === 'INPUT'
    ? err.previousElementSibling
    : err?.parentElement?.querySelector('input');
  if (msg && input) input.classList.add('invalid');
  else if (input) input.classList.remove('invalid');
}

function clearErrors(prefix) {
  document.querySelectorAll(`[id^="${prefix}-"][id$="-err"]`).forEach(el => {
    el.textContent = '';
    const input = el.previousElementSibling?.tagName === 'INPUT'
      ? el.previousElementSibling
      : el.parentElement?.querySelector('input');
    if (input) input.classList.remove('invalid');
  });
}

function isValidEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

/* ── Button Loading State ──────────────────────────────────── */
function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  const txt = btn.querySelector('.btn-text');
  const ldr = btn.querySelector('.btn-loader');
  btn.disabled = loading;
  txt.hidden = loading;
  ldr.hidden = !loading;
}

/* ── Password Visibility ───────────────────────────────────── */
function togglePw(inputId, btn) {
  const input = document.getElementById(inputId);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btn.querySelector('svg').style.opacity = isHidden ? '0.5' : '1';
}

/* ── Password Strength ─────────────────────────────────────── */
function getStrength(pw) {
  let score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  if (score <= 1) return 'weak';
  if (score <= 3) return 'fair';
  return 'strong';
}

document.getElementById('signup-password').addEventListener('input', function() {
  const bar = document.getElementById('pw-bar');
  if (!this.value) { bar.className = 'pw-bar'; return; }
  bar.className = `pw-bar ${getStrength(this.value)}`;
});

/* ═══════════════════════════════════════════════════════════════
   🔐  LOGIN
   ═══════════════════════════════════════════════════════════════ */
document.getElementById('form-login').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearErrors('login');
  clearToast();

  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  let valid = true;

  if (!email) { setError('login-email-err', 'Email is required.'); valid = false; }
  else if (!isValidEmail(email)) { setError('login-email-err', 'Enter a valid email address.'); valid = false; }

  if (!password) { setError('login-password-err', 'Password is required.'); valid = false; }

  if (!valid) return;

  setLoading('btn-login', true);

  const { data, error } = await db.auth.signInWithPassword({ email, password });

  setLoading('btn-login', false);

  if (error) {
    const map = {
      'Invalid login credentials': 'Incorrect email or password. Please try again.',
      'Email not confirmed': 'Please verify your email before signing in.',
    };
    const msg = map[error.message] || error.message || 'Sign in failed. Please try again.';
    showToast(msg, 'error');
    return;
  }

  showToast('Signed in! Redirecting…', 'success');
  setTimeout(() => { window.location.href = REDIRECT_URL; }, 900);
});

/* ═══════════════════════════════════════════════════════════════
   🆕  SIGN UP
   ═══════════════════════════════════════════════════════════════ */
document.getElementById('form-signup').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearErrors('signup');
  clearToast();

  const username = document.getElementById('signup-username').value.trim();
  const email    = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  let valid = true;

  if (!username) { setError('signup-username-err', 'Username is required.'); valid = false; }
  else if (username.length < 3) { setError('signup-username-err', 'Username must be at least 3 characters.'); valid = false; }

  if (!email) { setError('signup-email-err', 'Email is required.'); valid = false; }
  else if (!isValidEmail(email)) { setError('signup-email-err', 'Enter a valid email address.'); valid = false; }

  if (!password) { setError('signup-password-err', 'Password is required.'); valid = false; }
  else if (password.length < 8) { setError('signup-password-err', 'Password must be at least 8 characters.'); valid = false; }

  if (!valid) return;

  setLoading('btn-signup', true);

  const { data, error } = await db.auth.signUp({
    email,
    password,
    options: {
      data: { username },
      emailRedirectTo: REDIRECT_URL,
    },
  });

  setLoading('btn-signup', false);

  if (error) {
    const map = {
      'User already registered': 'An account with this email already exists.',
    };
    const msg = map[error.message] || error.message || 'Sign up failed. Please try again.';
    showToast(msg, 'error');
    return;
  }

  // If email confirmation is required
  if (data?.user && !data.session) {
    showToast('Account created! Check your inbox to confirm your email.', 'success');
    document.getElementById('form-signup').reset();
    document.getElementById('pw-bar').className = 'pw-bar';
    return;
  }

  // If email confirmation is disabled in Supabase — redirect immediately
  showToast('Account created! Redirecting…', 'success');
  setTimeout(() => { window.location.href = REDIRECT_URL; }, 900);
});

/* ═══════════════════════════════════════════════════════════════
   🔑  RESET PASSWORD
   ═══════════════════════════════════════════════════════════════ */
document.getElementById('form-reset').addEventListener('submit', async (e) => {
  e.preventDefault();
  clearErrors('reset');
  clearToast();

  const email = document.getElementById('reset-email').value.trim();
  let valid = true;

  if (!email) { setError('reset-email-err', 'Email is required.'); valid = false; }
  else if (!isValidEmail(email)) { setError('reset-email-err', 'Enter a valid email address.'); valid = false; }

  if (!valid) return;

  setLoading('btn-reset', true);

  const { error } = await db.auth.resetPasswordForEmail(email, {
    redirectTo: `${window.location.origin}${REDIRECT_URL}`,
  });

  setLoading('btn-reset', false);

  if (error) {
    showToast(error.message || 'Could not send reset email. Please try again.', 'error');
    return;
  }

  showToast('Reset link sent! Check your inbox.', 'success');
  document.getElementById('reset-email').value = '';
});

/* ── Handle Supabase session on page load ──────────────────── */
(async () => {
  const { data: { session } } = await db.auth.getSession();
  if (session) {
    // User is already signed in — redirect
    window.location.href = REDIRECT_URL;
  }
})();
  </script>
